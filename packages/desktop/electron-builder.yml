appId: dev.waza-ide.waza
productName: Waza
copyright: Copyright © 2026 mdl-systems

publish:
  provider: github
  owner: waza-ide
  repo: waza
  releaseType: release

directories:
  output: release
  buildResources: build

artifactName: waza_${version}_${arch}.${ext}

files:
  - dist/**
  - node_modules/**
  - package.json

linux:
  target:
    - deb
    - AppImage
  category: Development
  icon: build/icon.png
  executableName: waza

deb:
  maintainer: "mdl-systems <dev@waza-ide.dev>"
  depends:
    - libgtk-3-0
    - libnotify4
    - libnss3
    - libxss1
    - libxtst6
    - xdg-utils
    - libatspi2.0-0
    - libuuid1
